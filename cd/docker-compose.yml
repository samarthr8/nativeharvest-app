version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nativeharvest-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-nativeharvest}
      POSTGRES_USER: ${DB_USER:-nhuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nhuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nativeharvest-net

  backend:
    image: samarthr8/nativeharvest-backend:${IMAGE_TAG}
    container_name: nativeharvest-backend
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - nativeharvest-net

  frontend:
    image: samarthr8/nativeharvest-frontend:${IMAGE_TAG}
    container_name: nativeharvest-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - nativeharvest-net

volumes:
  postgres_data:

networks:
  nativeharvest-net:
    driver: bridge
