{{- if not .Values.secrets.jwtSecret }}
  {{- fail "secrets.jwtSecret is required. Use --set secrets.jwtSecret=<value>" }}
{{- end }}
{{- if not .Values.secrets.db.password }}
  {{- fail "secrets.db.password is required. Use --set secrets.db.password=<value>" }}
{{- end }}
{{- if not .Values.secrets.db.host }}
  {{- fail "secrets.db.host is required. Use --set secrets.db.host=<value>" }}
{{- end }}
{{- if not .Values.secrets.db.name }}
  {{- fail "secrets.db.name is required. Use --set secrets.db.name=<value>" }}
{{- end }}
{{- if not .Values.secrets.db.user }}
  {{- fail "secrets.db.user is required. Use --set secrets.db.user=<value>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: nativeharvest-secrets
type: Opaque
stringData:
  jwtSecret: {{ .Values.secrets.jwtSecret | quote }}
  dbHost: {{ .Values.secrets.db.host | quote }}
  dbName: {{ .Values.secrets.db.name | quote }}
  dbUser: {{ .Values.secrets.db.user | quote }}
  dbPassword: {{ .Values.secrets.db.password | quote }}

