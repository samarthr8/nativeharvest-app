apiVersion: apps/v1
kind: Deployment
metadata:
  name: nativeharvest-frontend
  labels:
    {{- include "nativeharvest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: nativeharvest-frontend
  template:
    metadata:
      labels:
        app: nativeharvest-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          ports:
            - containerPort: {{ .Values.frontend.port }}

