# ---- Project identification ----
sonar.projectKey=nativeharvest
sonar.projectName=NativeHarvest
sonar.projectVersion=1.0

# ---- Source directories ----
sonar.sources=frontend/src,backend/src

# ---- Tests ----
sonar.tests=frontend/src/__tests__,backend/__tests__

# ---- Language ----
sonar.sourceEncoding=UTF-8

# ---- Coverage reports (optional for now) ----
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# ---- Exclusions ----
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**

