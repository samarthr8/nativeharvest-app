# ---- Project identification ----
sonar.projectKey=nativeharvest
sonar.projectName=NativeHarvest
sonar.projectVersion=1.0

# ---- Source code ----
sonar.sources=frontend/src,backend/src

# ---- Test code ----
sonar.tests=frontend/src/__tests__,backend/__tests__

# ---- Explicitly exclude tests from sources ----
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__tests__/**

# ---- Encoding ----
sonar.sourceEncoding=UTF-8

# ---- Coverage (optional, backend only for now) ----
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

