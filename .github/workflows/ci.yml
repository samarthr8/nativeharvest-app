name: CI Pipeline

on:
  push:
    branches:
      - develop
      - release/*
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- FRONTEND IMAGE --------
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/nativeharvest-frontend:${IMAGE_TAG} frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nativeharvest-frontend:${IMAGE_TAG}

      # -------- BACKEND IMAGE --------
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/nativeharvest-backend:${IMAGE_TAG} backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nativeharvest-backend:${IMAGE_TAG}

