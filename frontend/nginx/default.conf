server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------
    # React SPA
    # -----------------------------
    location / {
        try_files $uri /index.html;
    }

    # -----------------------------
    # Backend API (INCLUDING WEBHOOKS)
    # -----------------------------
    location /api/ {

        proxy_pass http://backend:5000;

        # 🔥 REQUIRED FOR STABLE PROXYING
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 🔥 Forward real client details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 🔥 Allow Authorization headers
        proxy_set_header Authorization $http_authorization;

        # 🔥 VERY IMPORTANT FOR WEBHOOKS / PAYLOADS
        client_max_body_size 20M;

        # 🔥 Prevent buffering issues
        proxy_request_buffering off;
        proxy_buffering off;

        # 🔥 Increase timeout (webhooks can wait)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
