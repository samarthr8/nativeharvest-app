server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------
    # SECURITY HEADERS
    # -----------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------
    # GZIP COMPRESSION
    # -----------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # -----------------------------
    # STATIC ASSET CACHING
    # -----------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -----------------------------
    # 1. WHATSAPP / SEO BOT INTERCEPTOR
    # -----------------------------
    location /products/ {
        set $is_bot 0;
        
        # Check if the visitor is a social media scraper (WhatsApp, FB, Insta, etc.)
        if ($http_user_agent ~* "WhatsApp|facebookexternalhit|Twitterbot|LinkedInBot|Pinterest|Slackbot|TelegramBot") {
            set $is_bot 1;
        }

        # If it is a bot, rewrite the URL and send it to the Node.js backend
        if ($is_bot = 1) {
            rewrite ^/products/(.*)$ /api/seo/products/$1 break;
            proxy_pass http://backend:5000;
        }

        # If it is a normal human, serve the React app as usual
        try_files $uri /index.html;
    }

    # -----------------------------
    # 2. React SPA (Catch-all for the rest of the site)
    # -----------------------------
    location / {
        try_files $uri /index.html;
    }

    # -----------------------------
    # 3. Backend API (INCLUDING WEBHOOKS)
    # -----------------------------
    location /api/ {
        proxy_pass http://backend:5000;

        # REQUIRED FOR STABLE PROXYING
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_headers on;

        # Forward real client details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow Authorization headers
        proxy_set_header Authorization $http_authorization;

        # THIS IS THE HERO LINE FOR RAZORPAY
        proxy_set_header x-razorpay-signature $http_x_razorpay_signature;

        # VERY IMPORTANT FOR WEBHOOKS / PAYLOADS
        client_max_body_size 20M;

        # Prevent buffering issues
        proxy_request_buffering off;
        proxy_buffering off;

        # Increase timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}